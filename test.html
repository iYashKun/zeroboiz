<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🔒 Secure TempMail Client</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <style>
        .loader {
            border-top-color: #e11d48;
            animation: spinner 1.5s linear infinite;
        }
        @keyframes spinner {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .glass {
            background: rgba(23, 9, 13, 0.9);
            backdrop-filter: blur(16px);
        }
        .custom-scrollbar::-webkit-scrollbar {
            width: 6px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #6b7280;
            border-radius: 20px;
        }
    </style>
</head>
<body class="bg-zinc-950 text-zinc-100 min-h-screen font-sans">
    <div class="max-w-6xl mx-auto p-4 sm:p-6">
        <header class="text-center my-6">
            <div class="flex items-center justify-center gap-3">
                <div class="w-8 h-8 rounded-2xl bg-gradient-to-br from-rose-600 to-pink-600 flex items-center justify-center">
                    <i class="fa-solid fa-shield-halved text-white"></i>
                </div>
                <h1 class="text-3xl font-bold tracking-tight bg-gradient-to-r from-rose-400 to-pink-400 bg-clip-text text-transparent">
                    Secure TempMail
                </h1>
            </div>
        </header>

        <!-- Status -->
        <div id="status-box" class="glass border border-rose-500/20 rounded-2xl p-4 mb-6 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div id="status-icon" class="w-3 h-3 rounded-full bg-yellow-500 animate-pulse"></div>
                <span id="status-text" class="text-sm text-zinc-300">Initializing secure connection...</span>
            </div>
            <div id="token-badge" class="hidden text-xs bg-emerald-500/10 text-emerald-400 px-3 py-1.5 rounded-xl border border-emerald-500/30">
                ✓ Verified
            </div>
        </div>

        <div id="main-content" class="opacity-50 pointer-events-none transition-all">
            
            <!-- Email Generator -->
            <div class="glass border border-rose-500/10 rounded-2xl p-5 mb-6">
                <div class="flex flex-col sm:flex-row gap-4">
                    <div class="flex-1 flex bg-zinc-900 rounded-xl border border-zinc-700 focus-within:border-rose-500">
                        <input type="text" id="username-input" placeholder="username" 
                               class="flex-1 bg-transparent px-5 py-4 outline-none text-base">
                        <div class="bg-zinc-800 text-zinc-400 px-4 flex items-center border-l border-zinc-700 text-sm">
                            @mailto.plus
                        </div>
                    </div>
                    <div class="flex gap-3">
                        <button id="btn-custom" class="px-6 py-4 bg-rose-600 hover:bg-rose-500 rounded-xl font-medium text-sm">
                            Set Custom
                        </button>
                        <button id="btn-random" class="px-6 py-4 bg-zinc-800 hover:bg-zinc-700 rounded-xl font-medium text-sm">
                            Random
                        </button>
                    </div>
                </div>
                <p id="current-email-display" class="mt-4 text-rose-400 text-sm font-medium hidden"></p>
            </div>

            <div class="grid grid-cols-1 lg:grid-cols-12 gap-6">
                
                <!-- Inbox -->
                <div class="lg:col-span-5 glass border border-rose-500/10 rounded-2xl p-5 shadow-xl flex flex-col" style="height: 620px;">
                    <div class="flex items-center justify-between pb-4 border-b border-zinc-700 mb-3">
                        <h2 class="font-semibold text-lg">Inbox</h2>
                        <button id="btn-refresh" class="text-xs flex items-center gap-1.5 bg-zinc-800 hover:bg-zinc-700 px-4 py-2 rounded-xl">
                            <i class="fa-solid fa-arrows-rotate"></i> Refresh
                        </button>
                    </div>
                    
                    <div id="mail-list-container" class="flex-1 overflow-y-auto custom-scrollbar space-y-2 pr-2">
                        <!-- JS se fill hoga -->
                    </div>
                </div>

                <!-- Mail Reader -->
                <div class="lg:col-span-7 glass border border-rose-500/10 rounded-2xl p-6 shadow-xl flex flex-col" style="height: 620px;">
                    <div id="mail-reader-placeholder" class="flex-1 flex flex-col items-center justify-center text-zinc-400 text-center">
                        <i class="fa-solid fa-envelope-open text-5xl mb-4 opacity-50"></i>
                        <p class="text-base">Select a message from inbox</p>
                    </div>
                    
                    <div id="mail-reader-content" class="hidden flex-col h-full">
                        <div class="border-b border-zinc-700 pb-4 mb-4">
                            <h3 id="mail-subject" class="text-xl font-semibold leading-tight"></h3>
                            <div class="flex justify-between text-sm mt-4 text-zinc-400">
                                <div>From: <span id="mail-from" class="text-zinc-200"></span></div>
                                <div id="mail-date" class="font-medium"></div>
                            </div>
                        </div>
                        
                        <!-- Scrollable Body -->
                        <div id="mail-body" class="flex-1 overflow-y-auto pr-2 custom-scrollbar text-zinc-200 text-[15.5px] leading-relaxed">
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <script>
        const API_BASE = "https://anycors.vercel.app/v2/cors?u=https://tempmails-blond.vercel.app";
        let csrfAuthToken = null;
        let activeUsername = '';

        const statusIcon = document.getElementById('status-icon');
        const statusText = document.getElementById('status-text');
        const tokenBadge = document.getElementById('token-badge');
        const mainContent = document.getElementById('main-content');
        const usernameInput = document.getElementById('username-input');
        const currentEmailDisplay = document.getElementById('current-email-display');
        const mailListContainer = document.getElementById('mail-list-container');
        const mailReaderPlaceholder = document.getElementById('mail-reader-placeholder');
        const mailReaderContent = document.getElementById('mail-reader-content');

        // Handshake
        window.addEventListener('DOMContentLoaded', async () => {
            try {
                statusText.innerText = "Requesting cryptographic challenge...";
                const challengeRes = await fetch(`${API_BASE}/api/auth/challenge`);
                const challengeData = await challengeRes.json();
                
                if(!challengeData.success) throw new Error("Challenge failed");
                
                const { seed, difficulty } = challengeData.challenge;
                statusText.innerText = `Solving PoW (${difficulty})...`;
                
                let nonce = 0;
                let hash = "";
                const targetPrefix = "0".repeat(difficulty);
                
                while (true) {
                    hash = CryptoJS.SHA256(seed + nonce).toString(CryptoJS.enc.Hex);
                    if (hash.startsWith(targetPrefix)) break;
                    nonce++;
                }
                
                statusText.innerText = "Verifying solution...";
                const verifyRes = await fetch(`${API_BASE}/api/auth/verify`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ seed, nonce })
                });
                
                const verifyData = await verifyRes.json();
                if(!verifyData.success) throw new Error("Verification failed");
                
                csrfAuthToken = verifyData.csrfAuthToken;
                
                statusIcon.className = "w-3 h-3 rounded-full bg-emerald-500";
                statusText.innerText = "Secure connection established";
                tokenBadge.classList.remove('hidden');
                mainContent.classList.remove('opacity-50', 'pointer-events-none');
            } catch (err) {
                statusIcon.className = "w-3 h-3 rounded-full bg-rose-500";
                statusText.innerText = "Handshake Failed";
            }
        });

        const fetchInbox = async (username, isRandom = false) => {
            if(!csrfAuthToken) return;
            
            mailListContainer.innerHTML = '<div class="text-center py-10 text-rose-400"><div class="loader mx-auto"></div></div>';
            
            let url = `${API_BASE}/api/inbox`;
            if (isRandom) url += `?type=random`;
            else url += `?username=${encodeURIComponent(username)}`;
            
            try {
                const res = await fetch(url, { headers: { 'X-CSRFAuth-Token': csrfAuthToken } });
                const data = await res.json();
                if(!data.success) throw new Error(data.error);
                
                activeUsername = data.username;
                usernameInput.value = activeUsername;
                currentEmailDisplay.innerText = `📧 ${data.email}`;
                currentEmailDisplay.classList.remove('hidden');
                
                mailListContainer.innerHTML = '';
                if (data.count === 0) {
                    mailListContainer.innerHTML = '<div class="text-center text-zinc-400 py-16 text-sm">No messages yet</div>';
                    return;
                }
                
                data.mails.forEach(mail => {
                    const div = document.createElement('div');
                    div.className = "p-4 bg-zinc-900 hover:bg-zinc-800 border border-transparent hover:border-rose-500/30 rounded-2xl cursor-pointer transition-all";
                    div.innerHTML = `
                        <div class="flex justify-between text-xs text-zinc-400">
                            <span class="font-medium text-zinc-100">${mail.from_mail}</span>
                            <span>${mail.time || mail.time_str}</span>
                        </div>
                        <div class="font-medium mt-1 text-base leading-tight">${mail.subject || '(No Subject)'}</div>
                        <div class="text-sm text-zinc-400 mt-2 line-clamp-2">${mail.text || ''}</div>
                    `;
                    div.onclick = () => fetchMailDetails(mail.mail_id);
                    mailListContainer.appendChild(div);
                });
            } catch (err) {
                mailListContainer.innerHTML = `<div class="text-rose-400 py-8 text-center">Error loading inbox</div>`;
            }
        };

        const fetchMailDetails = async (mailId) => {
            mailReaderPlaceholder.classList.add('hidden');
            mailReaderContent.classList.remove('hidden');
            
            document.getElementById('mail-body').innerHTML = `<div class="text-center py-12"><div class="loader mx-auto"></div><p class="text-xs mt-4">Decrypting...</p></div>`;
            
            try {
                const res = await fetch(`${API_BASE}/api/mail/${mailId}?username=${encodeURIComponent(activeUsername)}`, {
                    headers: { 'X-CSRFAuth-Token': csrfAuthToken }
                });
                const data = await res.json();
                const mail = data.data;
                
                document.getElementById('mail-subject').innerText = mail.subject || '(No Subject)';
                document.getElementById('mail-from').innerText = mail.from_mail;
                document.getElementById('mail-date').innerText = mail.date;
                
                const bodyContainer = document.getElementById('mail-body');
                bodyContainer.innerHTML = mail.html ? mail.html : `<p class="whitespace-pre-wrap">${mail.text || 'No content'}</p>`;
            } catch (err) {
                document.getElementById('mail-body').innerHTML = `<div class="text-rose-400 py-8">Failed to load email</div>`;
            }
        };

        // Event Listeners
        document.getElementById('btn-custom').onclick = () => {
            const val = usernameInput.value.trim();
            if(val) fetchInbox(val, false);
        };
        document.getElementById('btn-random').onclick = () => fetchInbox('', true);
        document.getElementById('btn-refresh').onclick = () => {
            if(activeUsername) fetchInbox(activeUsername, false);
        };
    </script>
</body>
</html>
