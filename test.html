<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🔒 Secure TempMail Client</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <style>
        .loader {
            border-top-color: #e11d48;
            animation: spinner 1.5s linear infinite;
        }
        @keyframes spinner {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .glass {
            background: rgba(23, 9, 13, 0.85);
            backdrop-filter: blur(16px);
        }
    </style>
</head>
<body class="bg-zinc-950 text-zinc-100 min-h-screen font-sans">
    <div class="max-w-7xl mx-auto p-4 sm:p-6 lg:p-8">
        <header class="text-center my-10">
            <div class="flex items-center justify-center gap-3 mb-4">
                <div class="w-10 h-10 rounded-2xl bg-gradient-to-br from-rose-600 to-pink-600 flex items-center justify-center">
                    <i class="fa-solid fa-shield-halved text-white text-2xl"></i>
                </div>
                <h1 class="text-4xl sm:text-5xl font-bold tracking-tighter bg-gradient-to-r from-rose-400 via-pink-400 to-purple-400 bg-clip-text text-transparent">
                    Secure TempMail
                </h1>
            </div>
            <p class="text-zinc-400 text-lg">Unbreakable temporary email with cryptographic protection</p>
        </header>

        <!-- Status -->
        <div id="status-box" class="glass border border-rose-500/20 rounded-3xl p-5 mb-8 flex items-center justify-between shadow-2xl">
            <div class="flex items-center gap-4">
                <div id="status-icon" class="w-4 h-4 rounded-full bg-yellow-500 animate-pulse"></div>
                <span id="status-text" class="text-zinc-300 font-medium">Initializing secure cryptographic handshake...</span>
            </div>
            <div id="token-badge" class="hidden text-xs bg-emerald-500/10 text-emerald-400 px-4 py-2 rounded-2xl font-medium border border-emerald-500/30">
                ✓ X-CSRFAuth Verified
            </div>
        </div>

        <div id="main-content" class="opacity-50 pointer-events-none transition-all duration-700">
            
            <!-- Email Generator -->
            <div class="glass border border-rose-500/10 rounded-3xl p-8 shadow-2xl mb-8">
                <label class="block text-xs uppercase tracking-widest text-zinc-400 mb-3">Your Temporary Email</label>
                <div class="flex flex-col md:flex-row gap-4">
                    <div class="flex-1 flex bg-zinc-900 rounded-3xl border border-zinc-700 focus-within:border-rose-500 transition-all overflow-hidden">
                        <input type="text" id="username-input" placeholder="username" 
                               class="w-full bg-transparent px-7 py-6 text-xl outline-none text-white">
                        <div class="bg-zinc-800 text-zinc-400 px-6 flex items-center border-l border-zinc-700 text-lg">
                            @mailto.plus
                        </div>
                    </div>
                    <div class="flex gap-3">
                        <button id="btn-custom" 
                                class="px-10 py-6 bg-gradient-to-r from-rose-600 to-pink-600 hover:from-rose-500 hover:to-pink-500 rounded-3xl font-semibold text-lg shadow-lg shadow-rose-600/30 transition">
                            Set Custom
                        </button>
                        <button id="btn-random" 
                                class="px-10 py-6 bg-zinc-800 hover:bg-zinc-700 rounded-3xl font-semibold text-lg transition">
                            Random
                        </button>
                    </div>
                </div>
                <p id="current-email-display" class="mt-5 text-rose-400 font-medium text-lg hidden"></p>
            </div>

            <!-- Main Area -->
            <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
                
                <!-- Inbox -->
                <div class="lg:col-span-1 glass border border-rose-500/10 rounded-3xl p-6 shadow-2xl flex flex-col h-[580px]">
                    <div class="flex items-center justify-between pb-5 border-b border-zinc-700">
                        <h2 class="text-2xl font-semibold">Inbox</h2>
                        <button id="btn-refresh" 
                                class="flex items-center gap-2 bg-zinc-800 hover:bg-zinc-700 px-5 py-3 rounded-2xl text-sm transition">
                            <i class="fa-solid fa-arrows-rotate"></i> Refresh
                        </button>
                    </div>
                    
                    <div id="mail-list-container" class="flex-1 overflow-y-auto space-y-3 pt-4 custom-scrollbar">
                        <!-- Will be filled by JS -->
                    </div>
                </div>

                <!-- Mail Reader -->
                <div class="lg:col-span-2 glass border border-rose-500/10 rounded-3xl p-8 shadow-2xl h-[580px] flex flex-col">
                    <div id="mail-reader-placeholder" class="flex-1 flex flex-col items-center justify-center text-center text-zinc-400">
                        <i class="fa-solid fa-envelope-open text-7xl mb-6 opacity-40"></i>
                        <p class="text-xl">Select an email to read</p>
                        <p class="text-sm mt-2">Secure & encrypted content will appear here</p>
                    </div>
                    
                    <div id="mail-reader-content" class="hidden flex-col h-full">
                        <div class="border-b border-zinc-700 pb-6">
                            <h3 id="mail-subject" class="text-2xl font-semibold mb-3"></h3>
                            <div class="flex justify-between text-sm text-zinc-400">
                                <div>From: <span id="mail-from" class="text-zinc-200"></span></div>
                                <div id="mail-date" class="font-medium"></div>
                            </div>
                        </div>
                        <div id="mail-body" class="flex-1 overflow-y-auto mt-6 text-zinc-200 leading-relaxed text-[17px]">
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <script>
        const API_BASE = "https://anycors.vercel.app/v2/cors?u=https://tempmails-blond.vercel.app";
        let csrfAuthToken = null;
        let activeUsername = '';
        
        const statusIcon = document.getElementById('status-icon');
        const statusText = document.getElementById('status-text');
        const tokenBadge = document.getElementById('token-badge');
        const mainContent = document.getElementById('main-content');
        const usernameInput = document.getElementById('username-input');
        const currentEmailDisplay = document.getElementById('current-email-display');
        const mailListContainer = document.getElementById('mail-list-container');
        const mailReaderPlaceholder = document.getElementById('mail-reader-placeholder');
        const mailReaderContent = document.getElementById('mail-reader-content');

        // Handshake (Original logic preserved)
        window.addEventListener('DOMContentLoaded', async () => {
            try {
                statusText.innerText = "Requesting cryptographic challenge seed...";
                const challengeRes = await fetch(`${API_BASE}/api/auth/challenge`);
                const challengeData = await challengeRes.json();
               
                if(!challengeData.success) throw new Error("Challenge handshake aborted.");
                const { seed, difficulty } = challengeData.challenge;
                statusText.innerText = `Solving Proof-of-Work (Difficulty: ${difficulty})...`;
                
                let nonce = 0;
                let hash = "";
                const targetPrefix = "0".repeat(difficulty);
                
                await new Promise((resolve) => setTimeout(resolve, 50));
                
                while (true) {
                    hash = CryptoJS.SHA256(seed + nonce).toString(CryptoJS.enc.Hex);
                    if (hash.startsWith(targetPrefix)) break;
                    nonce++;
                }
                
                statusText.innerText = "Verifying solution...";
                const verifyRes = await fetch(`${API_BASE}/api/auth/verify`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ seed, nonce })
                });
               
                const verifyData = await verifyRes.json();
                if(!verifyData.success) throw new Error("Verification failed.");
                
                csrfAuthToken = verifyData.csrfAuthToken;
               
                statusIcon.className = "w-4 h-4 rounded-full bg-emerald-500";
                statusText.innerText = "Secure channel established successfully";
                tokenBadge.classList.remove('hidden');
                mainContent.classList.remove('opacity-50', 'pointer-events-none');
            } catch (err) {
                statusIcon.className = "w-4 h-4 rounded-full bg-rose-500";
                statusText.innerText = `Handshake Failed`;
                statusText.classList.add('text-rose-400');
            }
        });

        // Rest of your original functions (fetchInbox, fetchMailDetails, etc.) same as before
        const fetchInbox = async (username, isRandom = false) => {
            if(!csrfAuthToken) return;
           
            mailListContainer.innerHTML = '<div class="text-center text-rose-400 py-12"><div class="loader ease-linear rounded-full border-4 border-t-4 border-zinc-700 h-8 w-8 mx-auto mb-3"></div>Loading mailbox...</div>';
           
            let url = `${API_BASE}/api/inbox`;
            if (isRandom) url += `?type=random`;
            else url += `?username=${encodeURIComponent(username)}`;
            
            try {
                const res = await fetch(url, { headers: { 'X-CSRFAuth-Token': csrfAuthToken } });
                const data = await res.json();
                if(!data.success) throw new Error(data.error);
                
                activeUsername = data.username;
                usernameInput.value = activeUsername;
                currentEmailDisplay.innerText = `Active: ${data.email}`;
                currentEmailDisplay.classList.remove('hidden');
                
                mailListContainer.innerHTML = '';
                if(data.count === 0) {
                    mailListContainer.innerHTML = '<div class="text-center text-zinc-400 py-16">No messages yet. Waiting for incoming mails...</div>';
                    return;
                }
                
                data.mails.forEach(mail => {
                    const div = document.createElement('div');
                    div.className = "bg-zinc-900 border border-zinc-700 p-5 rounded-3xl cursor-pointer hover:border-rose-500/50 hover:bg-zinc-800 transition-all";
                    div.innerHTML = `
                        <div class="flex justify-between text-sm">
                            <span class="font-semibold text-zinc-200">${mail.from_mail}</span>
                            <span class="text-xs text-zinc-500">${mail.time || mail.time_str}</span>
                        </div>
                        <div class="mt-2 font-medium text-lg leading-tight">${mail.subject || '(No Subject)'}</div>
                        <div class="text-sm text-zinc-400 mt-3 line-clamp-2">${mail.text || ''}</div>
                    `;
                    div.onclick = () => fetchMailDetails(mail.mail_id);
                    mailListContainer.appendChild(div);
                });
            } catch (err) {
                mailListContainer.innerHTML = `<div class="text-rose-400 py-8 text-center">Error: ${err.message}</div>`;
            }
        };

        const fetchMailDetails = async (mailId) => {
            mailReaderPlaceholder.classList.add('hidden');
            mailReaderContent.classList.remove('hidden');
            
            document.getElementById('mail-body').innerHTML = `
                <div class="text-center py-20">
                    <div class="loader ease-linear rounded-full border-4 border-t-4 border-zinc-700 h-8 w-8 mx-auto"></div>
                    <p class="mt-6 text-zinc-400">Decrypting secure content...</p>
                </div>`;
            
            try {
                const res = await fetch(`${API_BASE}/api/mail/${mailId}?username=${encodeURIComponent(activeUsername)}`, {
                    headers: { 'X-CSRFAuth-Token': csrfAuthToken }
                });
                const data = await res.json();
                if(!data.success) throw new Error(data.message || "Failed");
                
                const mail = data.data;
                document.getElementById('mail-subject').innerText = mail.subject || '(No Subject)';
                document.getElementById('mail-from').innerText = mail.from_mail;
                document.getElementById('mail-date').innerText = mail.date;
                
                const bodyContainer = document.getElementById('mail-body');
                bodyContainer.innerHTML = mail.html ? mail.html : `<p class="whitespace-pre-wrap">${mail.text || '(Empty)'}</p>`;
            } catch (err) {
                document.getElementById('mail-body').innerHTML = `<div class="text-rose-400 py-8">${err.message}</div>`;
            }
        };

        // Buttons
        document.getElementById('btn-custom').onclick = () => {
            const val = usernameInput.value.trim();
            if(val) fetchInbox(val, false);
        };
        document.getElementById('btn-random').onclick = () => fetchInbox('', true);
        document.getElementById('btn-refresh').onclick = () => {
            if(activeUsername) fetchInbox(activeUsername, false);
        };
    </script>
</body>
</html>
